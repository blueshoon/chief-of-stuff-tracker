          stroke-linecap="round"/>
    <!-- Checkmark -->
    <path d="M65 132 L112 180 L260 30"
          fill="none"
          stroke="currentColor"
          stroke-width="28"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <text x="500" y="232"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="96"
        font-weight="300"
        letter-spacing="34"
